<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>x.swt | تسجيل الدخول</title>
    <style>
        body {
            background-color: #0f172a; /* لون داكن ملكي */
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: #1e293b;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 350px;
            text-align: center;
            border: 1px solid #334155;
        }
        .logo {
            font-size: 32px;
            font-weight: bold;
            color: #22c55e; /* أخضر الربح */
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #22c55e;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        button:hover {
            background: #16a34a;
            transform: translateY(-2px);
        }
        .footer-text {
            margin-top: 20px;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo">x.swt</div>
    <h3>تسجيل الدخول للمنصة</h3>
    <input type="email" placeholder="البريد الإلكتروني">
    <input type="password" placeholder="كلمة المرور">
    <button onclick="alert('سيتم الربط مع Supabase الآن...')">دخول</button>
    <div class="footer-text">أقل مبلغ للإيداع هو 300$ لتفعيل الأرباح</div>
</div>

</body>
</html>
